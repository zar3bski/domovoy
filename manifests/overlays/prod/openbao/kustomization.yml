apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: openbao-secrets
    namespace: openbao
    envs:
      - secret.env

resources:
  - ../../../base/openbao
  - ingressroute-openbao.yml
  - certificate-openbao.yml
  - serverstransport-openbao-internal.yml

patches:
  - path: ./patch-pvc-openbao.yml
    target:
      kind: PersistentVolumeClaim
      namespace: openbao
